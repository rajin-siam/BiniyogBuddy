version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: biniyogbuddy-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mbstusiam
      POSTGRES_DB: biniyogbuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biniyogbuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis-stack:latest
    container_name: biniyogbuddy-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: biniyogbuddy-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/biniyogbuddy
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: mbstusiam
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-secret-key}
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  dse-scraper:
    build:
      context: ../services/dse-scraper
    container_name: biniyogbuddy-scraper
    depends_on:
      api-app:
        condition: service_healthy
    environment:
      SPRING_INGEST_URL: http://api-app:8080/internal/ingest
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-secret-key}
      SCRAPE_INTERVAL_MINUTES: ${SCRAPE_INTERVAL_MINUTES:-10}
    restart: unless-stopped

volumes:
  postgres_data:

